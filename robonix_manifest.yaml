manifestVersion: 1
name: robonix-ranger-mini-deploy

# Robonix deploy manifest for the AgileX Ranger Mini + Livox MID-360
# + Intel RealSense D435i stack, runs on the Jetson Orin (syswonder
# desktop, ssh alias `robot`). On the Jetson, the latest robonix
# source tree lives at /home/syswonder/wheatfox/robonix; rbnx is
# `cargo run -p robonix-cli --release` or whatever wrapper the user
# has set up.
#
# Each `url:` package is a separate GitHub repo under SysWonder. `rbnx
# build` clones them into rbnx-boot/cache/<name>/ and runs each
# package's scripts/build.sh; `rbnx boot` then spawns each one and
# calls Driver(CMD_INIT, config_json) on its */driver gRPC interface.
#
# The manifest is an UNORDERED list. Boot ordering between packages is
# handled implicitly: a package whose dep isn't ready returns
# Driver_Response(state="deferred"); rbnx retries deferred packages
# in a loop until the system reaches steady state. No explicit dep
# graph in the manifest.

env:
  # Override on the launching shell if needed:
  #   VLM_BASE_URL  for cloud-side reasoning (pilot)
  #   VLM_API_KEY
  #   VLM_MODEL

system:
  atlas:
    listen: 127.0.0.1:50051
    log: info
  executor:
    listen: 127.0.0.1:50061
    log: info
  pilot:
    listen: 127.0.0.1:50071
    log: info
    vlm:
      upstream: ${VLM_BASE_URL}
      api_key: ${VLM_API_KEY}
      model: ${VLM_MODEL}
      api_format: openai

  # Soma (URDF + robot_state_publisher) is on the v0.2 roadmap, not
  # yet implemented — see Robonix dev guide §3.6 / 附录 B. For ranger
  # bring-up, run `static_transform_publisher` from a side launch (see
  # README.md sketch) until soma ships.
  #
  # Voice / speech (ASR + TTS + audio_driver) is off for ranger first
  # bring-up — chat is text-only, goes through liaison. Drop a
  # `speech:` block + audio primitives into this manifest later when
  # mics are wired.

  liaison:
    listen: 127.0.0.1:50081
    log: info
  nexus:
    log: info
  memory:
    backend: sqlite
    log: info
  scene:
    log: info

primitive:
  # ── MID-360 lidar ───────────────────────────────────────────────────
  # Owns primitive/lidar/*. Spawns livox_ros_driver2 in Driver.Init.
  # Also makes /livox/imu live on the bus (consumed by mid360_imu below).
  - name: mid360_lidar
    url: https://github.com/syswonder/primitive-livox-mid360-lidar-rbnx
    branch: main
    config:
      lidar_topic: /scanner/cloud
      lidar_ip: 192.168.1.161
      # host_ip: omit → atlas_bridge auto-resolves via `ip route get`.
      # Override only if the Jetson NIC's static config drifts.
      xfer_format: 2 # PointCloud2 XYZIT (rtabmap-friendly)
      sentinel_timeout_s: 30.0

  # ── MID-360 IMU (topic shim, no ROS spawn) ──────────────────────────
  # Owns primitive/imu/*. Subscribes to /livox/imu (which mid360_lidar's
  # livox launch publishes) and atlas-routes it. If mid360_lidar isn't
  # initialized yet, this returns deferred and rbnx retries.
  - name: mid360_imu
    url: https://github.com/syswonder/primitive-livox-mid360-imu-rbnx
    branch: main
    config:
      imu_topic: /livox/imu
      defer_probe_s: 2.0

  # ── RealSense D435i (RGBD) ─────────────────────────────────────────
  # Owns primitive/camera/*. Spawns realsense2_camera's rs_launch.py.
  - name: realsense_camera
    url: https://github.com/syswonder/primitive-intel-realsense_d435i-camera-rbnx
    branch: main
    config:
      camera_name: camera_435i
      rgb_profile: 640x480x30
      depth_profile: 848x480x30
      align_depth: true
      enable_imu: true # published, NOT atlas-routed (mid360 IMU is canonical)
      enable_sync: true
      sentinel_timeout_s: 30.0

  # ── Ranger Mini chassis ─────────────────────────────────────────────
  - name: ranger_chassis
    url: https://github.com/syswonder/primitive-agilex-ranger_mini_v3-chassis-rbnx
    branch: main
    config:
      port_name: can_ranger
      robot_model: ranger_mini_v2
      odom_topic_name: odom
      publish_odom_tf: true # soma not yet shipped — chassis owns /tf for now
      sentinel_timeout_s: 30.0

service:
  # ── SLAM (rtabmap) ──────────────────────────────────────────────────
  # Discovers lidar3d + rgb + depth + imu via atlas at Init time and
  # configures rtabmap to fuse them. Outputs service/map/{occupancy_grid,
  # pointcloud, pose, odom} on atlas — algo-agnostic for consumers.
  - name: mapping
    url: https://github.com/syswonder/service-map-rbnx
    branch: main
    config:
      algo: rtabmap
      platform: jetson_orin
      sensors:
        lidar2d: false
        lidar3d: true # MID-360 PointCloud2
        rgb: true # RealSense visual loop closure
        rgbd: true # RealSense depth → 3D fusion
        # imu: rtabmap launch doesn't wire IMU yet (the comment in
        # launch/rtabmap_2d.launch.py promises it but the code isn't
        # there). Leave OFF for the first bring-up — the MID-360's
        # lidar alone is usually enough for graph SLAM. Flip to true
        # once mapping_rbnx grows imu_topic + subscribe_imu wiring.
        imu: false
        # odom: chassis is powered off this run; rtabmap derives
        # odometry internally from lidar (icp_odometry) / RGBD.
        # Flip to true once ranger_chassis_rbnx is enabled.
        odom: false
  # ── Navigation ───────────────────────────────────────────────
  - name: nav2
    url: https://github.com/syswonder/service-navigation-rbnx
    branch: main
    config: {}

skill:
  - name: explore
    url: https://github.com/syswonder/skill-explore-rbnx
    branch: main
    config:
      # example place holders
      explore_mode: frontier
      timeout_s: 600

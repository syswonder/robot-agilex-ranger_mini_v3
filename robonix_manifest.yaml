manifestVersion: 1
name: robonix-ranger-mini-v3-deploy

catalog:
  name: robonix.robot.agilex.ranger_mini_v3
  version: 0.2.0
  description: Robonix deployment for the AgileX Ranger Mini v3 robot.
  tags: [robot, deploy, agilex, ranger_mini_v3, jetson, lidar, rgbd, scene, mapping, navigation]
  maintainers:
    - wheatfox <wheatfox17@icloud.com>

env:
  # Single-host ROS 2 transport. scripts/start.sh owns the local rmw_zenohd
  # process; all native packages inherit the same RMW and router endpoint.
  ROS_DOMAIN_ID: "0"
  RMW_IMPLEMENTATION: rmw_zenoh_cpp
  ROBONIX_RMW_IMPLEMENTATION: rmw_zenoh_cpp
  ROBONIX_ZENOH_ROUTER: tcp/127.0.0.1:7447
  ROBONIX_ZENOH_MODE: client

  # Jetson packages run against host ROS 2 and the JetPack CUDA Python stack.
  RBNX_BUILD_TARGET: jetson-native
  ROBONIX_SCENE_FORCE: native
  ROBONIX_SCENE_PLATFORM: jetson_orin
  ROBONIX_SCENE_ROS_DISTRO: humble
  SCENE_NATIVE_PYTHON: python3
  SCENE_WEB_PORT: "50107"
  ROBONIX_MAPPING_FORCE: native
  ROBONIX_MAPPING_PLATFORM: jetson_orin
  MAPPING_WEBUI_PORT: "8091"
  ROBONIX_NAV2_FORCE: native
  ROBONIX_NAV2_PLATFORM: jetson_orin

  # Spatial and semantic state use the same map identity.
  SCENE_MAP_ID: ranger_lab
  MAPPING_MAPS_DIR: ${HOME}/.robonix/maps
  SCENE_OBJECT_MEMORY_DB: ${HOME}/.robonix/scene/objects.db
  SCENE_GRAPH_CACHE_DIR: ${HOME}/.robonix/scene/graph

  # Build-time mirrors only. All model weights are prepared by build scripts;
  # start must not download models.
  HF_ENDPOINT: https://hf-mirror.com
  PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple

  # Cloud speech requires no local ASR/TTS models or GPU runtime. SecretId and
  # SecretKey are supplied only through the operator environment.
  SPEECH_BACKEND: tencent

system:
  atlas:
    listen: 0.0.0.0:50051
    log: info
  executor:
    listen: 127.0.0.1:50061
    log: info
  pilot:
    listen: 127.0.0.1:50071
    log: info
    vlm:
      upstream: ${VLM_BASE_URL}
      api_key: ${VLM_API_KEY}
      model: ${VLM_MODEL}
      api_format: openai
  liaison:
    listen: 0.0.0.0:50081
    log: info
  soma:
    listen: 127.0.0.1:50091
    log: info
    provider_id: soma
    robot_yaml: ${ROBONIX_DEPLOY_DIR}/soma.yaml
  scene:
    log: info

primitive:
  # Publishes the Soma-owned URDF as /robot_description and the standard TF
  # tree. This has no body config of its own; Soma is the only URDF source.
  - name: robot_description
    url: https://github.com/syswonder/primitive-robot-description-rbnx
    branch: main
    manifest: package_manifest.native.yaml

  # Keep providers before consumers: the lidar process also publishes the
  # MID-360 IMU stream consumed by the next package.
  - name: mid360_lidar
    url: https://github.com/syswonder/primitive-livox-mid360-lidar-rbnx
    branch: main
    config:
      lidar_topic: /scanner/cloud
      imu_topic: /livox/imu
      lidar_ip: 192.168.1.161
      host_ip: 192.168.1.50
      xfer_format: 0
      sentinel_timeout_s: 45.0

  - name: mid360_imu
    url: https://github.com/syswonder/primitive-livox-mid360-imu-rbnx
    branch: main
    config:
      imu_topic: /livox/imu
      sentinel_timeout_s: 45.0

  - name: realsense_camera
    url: https://github.com/syswonder/primitive-intel-realsense_d435i-camera-rbnx
    branch: main
    config:
      camera_name: camera_435i
      rgb_profile: 640x480x30
      depth_profile: 640x480x15
      align_depth: true
      enable_imu: false
      enable_sync: true
      sentinel_timeout_s: 45.0

  - name: ranger_chassis
    url: https://github.com/syswonder/primitive-agilex-ranger_mini_v3-chassis-rbnx
    branch: main
    config:
      port_name: can_ranger
      robot_model: ranger_mini_v2
      odom_topic_name: odom
      odom_frame: odom
      base_frame: base_link
      publish_odom_tf: true
      sentinel_timeout_s: 30.0

  # The robot's USB audio device. This is the default mic/speaker provider for
  # onboard speech; client-side audio is a separate, session-bound path.
  - name: audio_driver
    path: ${ROBONIX_SOURCE_PATH}/examples/webots/primitives/audio_driver
    config:
      mic_device: plughw:0,0
      mic_sample_rate: 16000
      speaker_device: plughw:0,0
      speaker_sample_rate: 16000

  # Client-side audio over the existing WebSocket bridge. It is deliberately a
  # separate provider: speech/speak remains pinned to audio_driver unless a
  # caller explicitly targets audio_client_bridge.
  - name: audio_client_bridge
    path: ${ROBONIX_SOURCE_PATH}/examples/webots/primitives/audio_client_bridge
    config:
      host: ${AUDIO_CLIENT_SERVER_HOST}
      port: ${AUDIO_CLIENT_SERVER_PORT}

service:
  - name: memory
    path: ${ROBONIX_SOURCE_PATH}/services/memsearch
    config:
      backend: sqlite

  - name: speech
    path: ${ROBONIX_SOURCE_PATH}/services/speech
    config:
      speech_backend: tencent
      disable_whisper: true
      default_speaker_provider_id: audio_driver
      tencent_asr_appid: "1258720755"
      tencent_asr_engine: 16k_zh_en
      tencent_tts_voice_type: 502003
      tencent_tts_region: ap-guangzhou
      tencent_tts_model_type: 1
      tencent_tts_sample_rate: 16000
      tencent_tts_codec: pcm

  - name: voiceprint
    path: ${ROBONIX_SOURCE_PATH}/services/voiceprint
    config: {}

  - name: mapping
    url: https://github.com/syswonder/service-map-rbnx
    branch: main
    manifest: package_manifest.jetson-native.yaml
    config:
      algo: rtabmap
      platform: jetson_orin
      base_frame: base_link
      odom_frame: odom
      map_frame: map
      use_sim_time: false
      map_id: ranger_lab
      map_mode: mapping
      reset_map: false
      sensors:
        lidar2d: false
        lidar3d: true
        rgb: true
        depth: true
        imu: false
        odom: true

  - name: nav2
    url: https://github.com/syswonder/service-navigation-rbnx
    branch: main
    manifest: package_manifest.jetson-native.yaml
    config:
      params_profile: ranger_mini_v3
      use_sim_time: false
      action_wait_s: 90.0

skill:
  - name: explore
    url: https://github.com/syswonder/skill-explore-rbnx
    branch: main
    config:
      explore_mode: frontier
      timeout_s: 600

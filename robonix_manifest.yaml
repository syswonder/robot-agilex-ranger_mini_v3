manifestVersion: 1
name: robonix-ranger-mini-v3-deploy

catalog:
  name: robonix.robot.agilex.ranger_mini_v3
  version: 0.2.0
  description: Robonix deployment for the AgileX Ranger Mini v3 robot.
  license: Apache-2.0
  tags: [robot, deploy, agilex, ranger_mini_v3, jetson, lidar, rgbd, scene, mapping, navigation]
  maintainers:
    - wheatfox <wheatfox17@icloud.com>

env:
  # Single-host ROS 2 transport. scripts/start.sh owns the local rmw_zenohd
  # process; all native packages inherit the same RMW and router endpoint.
  ROS_DOMAIN_ID: "0"
  RMW_IMPLEMENTATION: rmw_zenoh_cpp
  ROBONIX_RMW_IMPLEMENTATION: rmw_zenoh_cpp
  ROBONIX_ZENOH_ROUTER: tcp/127.0.0.1:7447
  ROBONIX_ZENOH_MODE: client

  # Jetson packages run against host ROS 2 and the JetPack CUDA Python stack.
  RBNX_BUILD_TARGET: jetson-native
  ROBONIX_SCENE_FORCE: native
  ROBONIX_SCENE_PLATFORM: jetson_orin
  ROBONIX_SCENE_ROS_DISTRO: humble
  SCENE_NATIVE_PYTHON: python3
  SCENE_WEB_PORT: "50107"
  ROBONIX_MAPPING_FORCE: native
  ROBONIX_MAPPING_PLATFORM: jetson_orin
  MAPPING_WEBUI_PORT: "8091"
  ROBONIX_NAV2_FORCE: native
  ROBONIX_NAV2_PLATFORM: jetson_orin

  MAPPING_MAPS_DIR: ${HOME}/.robonix/maps
  SCENE_OBJECT_MEMORY_DB: ${HOME}/.robonix/scene/objects.db
  SCENE_GRAPH_CACHE_DIR: ${HOME}/.robonix/scene/graph
  SCENE_ANNOTATIONS_DIR: ${HOME}/.robonix/scene/annotations

  # Build-time mirrors only. All model weights are prepared by build scripts;
  # start must not download models.
  HF_ENDPOINT: https://hf-mirror.com
  PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple

  # Cloud speech requires no local ASR/TTS models or GPU runtime. SecretId and
  # SecretKey are supplied only through the operator environment.
  SPEECH_BACKEND: tencent

system:
  atlas:
    listen: 0.0.0.0:50051
  executor:
    listen: 0.0.0.0:50061
  pilot:
    listen: 127.0.0.1:50071
    vlm:
      upstream: ${VLM_BASE_URL}
      api_key: ${VLM_API_KEY}
      model: ${VLM_MODEL}
      api_format: openai
  liaison:
    listen: 0.0.0.0:50081
  soma:
    listen: 127.0.0.1:50091
    robot_yaml: ${ROBONIX_DEPLOY_DIR}/soma.yaml
  scene:
    camera_provider_id: realsense_camera

primitive:
  # Publishes the Soma-owned URDF as /robot_description and the standard TF
  # tree. This has no body config of its own; Soma is the only URDF source.
  - name: robot_description
    url: https://github.com/syswonder/primitive-robot-description-rbnx
    branch: main
    manifest: package_manifest.native.yaml

  # Keep providers before consumers: the lidar process also publishes the
  # MID-360 IMU stream consumed by the next package.
  - name: mid360_lidar
    url: https://github.com/syswonder/primitive-livox-mid360-lidar-rbnx
    branch: main
    config:
      lidar_ip: 192.168.1.161
      host_ip: 192.168.1.50
      xfer_format: 0
      # Three attempts including cleanup stay below Soma's 90 s INIT deadline.
      sentinel_timeout_s: 20.0

  - name: mid360_imu
    url: https://github.com/syswonder/primitive-livox-mid360-imu-rbnx
    branch: main
    config:
      sentinel_timeout_s: 45.0

  - name: realsense_camera
    url: https://github.com/syswonder/primitive-intel-realsense_d435i-camera-rbnx
    branch: main
    config:
      depth_profile: 640x480x30
      enable_imu: false
      sentinel_timeout_s: 45.0

  # Wrist-mounted Orbbec Dabai DCW used only by the Piper grasp pipeline.
  # Mapping and scene are pinned to realsense_camera in their configs below.
  - name: orbbec_camera
    path: /home/syswonder/lhw/rbnx_piper_packages/rbnx-boot/cache/OrbbecSDK_rbnx
    config:
      enable_depth: false
      depth_registration: false
      color_width: 1280
      color_height: 720
      color_format: YUYV

  - name: ranger_chassis
    url: https://github.com/syswonder/primitive-agilex-ranger_mini_v3-chassis-rbnx
    branch: main
    config:
      port_name: can_ranger
      publish_odom_tf: true

  - name: piper_ctl
    path: /home/syswonder/lhw/rbnx_piper_packages/rbnx-boot/cache/piper_ctl_rbnx
    config:
      can_port: can_piper

  # The robot's USB audio device. This is the default mic/speaker provider for
  # onboard speech; client-side audio is a separate, session-bound path.
  - name: audio_driver
    path: ${ROBONIX_SOURCE_PATH}/examples/webots/primitives/audio_driver
    config:
      mic_device: plughw:CARD=Plus,DEV=0
      mic_sample_rate: 16000
      speaker_device: plughw:CARD=Plus,DEV=0
      speaker_sample_rate: 16000

  # Client-side audio is a separate provider. The client discovers this
  # listener through Atlas and connects outward, so deployment never stores a
  # client address or a client-owned port. Speech/speak remains pinned to the
  # robot USB provider unless a caller explicitly selects this provider.
  - name: audio_client_bridge
    path: ${ROBONIX_SOURCE_PATH}/examples/webots/primitives/audio_client_bridge
    config: {}

service:
  - name: memory
    path: ${ROBONIX_SOURCE_PATH}/services/memsearch
    config: {}

  - name: speech
    path: ${ROBONIX_SOURCE_PATH}/services/speech
    config:
      default_speaker_provider_id: audio_driver
      tencent_asr_appid: ${TENCENT_ASR_APPID}
      tencent_tts_voice_type: 502003

  - name: voiceprint
    path: ${ROBONIX_SOURCE_PATH}/services/voiceprint
    config: {}

  - name: llm_detect
    path: /home/syswonder/lhw/rbnx_piper_packages/rbnx-boot/cache/llm_detect_rbnx
    config:
      llm_base_url: ${VLM_BASE_URL}
      llm_api_key: ${VLM_API_KEY}
      llm_model: ${VLM_MODEL}
      llm_timeout_s: 60.0
      camera_provider_id: orbbec_camera
      rotation_cam2arm: true
      skip_depth: true

  - name: grasp_pose
    path: /home/syswonder/lhw/rbnx_piper_packages/rbnx-boot/cache/grasp_pose_rbnx
    config:
      hand_eye_calibration_file: ${ROBONIX_DEPLOY_DIR}/rbnx-boot/hand-eye-data/2d_homography.npy
      default_desktop_height: -0.195
      catch_offset: 0.00

  - name: roboarm_ik
    path: /home/syswonder/lhw/rbnx_piper_packages/rbnx-boot/cache/roboarm_ik_rbnx
    config:
      init_joints_deg: [-1.837021, 93.526178, -36.180726, -5.065302, 17.399731, -0.323827]
      # init_joints_deg: [0.023987, 72.176551, -59.083526, -3.669045, 59.316402, -2.063901]
      teach_safe_joints_deg: [3.358211, 2.0, -2.0, -6.708426, 18.580102, 5.898858]
      carry_to_teach_safe_waypoints_deg:
        - [1.711088, 81.721467, -80.833939, -3.718019, 49.375697, -6.657454]

  - name: mapping
    url: https://github.com/syswonder/service-map-rbnx
    branch: main
    manifest: package_manifest.jetson-native.yaml
    config:
      # Production localization uses chassis odometry. The timestamped Mid360
      # cloud is deskewed against odom before RTAB-Map consumes it.
      # Use RGB for visual constraints and fuse depth with Mid360 occupancy.
      # Camera data stays inside RTAB-Map; Nav2 LaserScan remains lidar-only.
      # Use the chassis odom until a separately declared Mid360 LIO provider
      # passes the static-drift gate. RTAB-Map still fuses RGB-D and Mid360.
      deskew_lidar: true
      # Atlas discovers all streams; only Mid360 builds the 2D occupancy grid.
      occupancy_sources: [lidar]
      params_file: config/rtabmap_params.yaml
      sensor_providers:
        lidar3d: mid360_lidar
        odom: ranger_chassis
        rgb: realsense_camera
        depth: realsense_camera

  - name: nav2
    url: https://github.com/syswonder/service-navigation-rbnx
    branch: main
    manifest: package_manifest.jetson-native.yaml
    config:
      params_file: config/nav2_params.yaml
      bt_xml_file: config/navigate.xml
      scan_projection:
        enabled: true
        min_height_m: 0.30
        max_height_m: 1.40
        range_max_m: 12.0
        self_filter_margin_m: 0.05
      action_wait_s: 90.0
      provider_ids:
        map: mapping
        # Canonical odom owner. Replace with a declared Mid360 LIO provider
        # only after that provider exists and passes the static-drift gate.
        odom: ranger_chassis
        scan_cloud: mid360_lidar

skill:
  - name: explore
    url: https://github.com/syswonder/skill-explore-rbnx
    branch: main
    config: {}

  # Long-lived passerby greeting watch. Its Qwen3 VLM configuration is
  # independent from Pilot, and the skill never commands robot motion.
  - name: greet
    path: ./skills/greet
    config:
      # Bind the front RGB stream explicitly; this robot also has an Orbbec
      # provider exposing the same camera/rgb contract.
      camera_provider_id: realsense_camera
      soma_provider_id: soma
      chassis_provider_id: ranger_chassis
      vlm:
        upstream: ${GREET_VLM_BASE_URL}
        api_key: ${GREET_VLM_API_KEY}
        model: ${GREET_VLM_MODEL}

  - name: pick
    path: /home/syswonder/lhw/rbnx_piper_packages/rbnx-boot/cache/pick_skill_rbnx
    config:
      park_at_teach_safe_after_pick: true
